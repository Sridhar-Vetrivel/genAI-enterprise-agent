name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check psiog_kendra agents tests

      - name: Format check
        run: ruff format --check psiog_kendra agents tests

      # The suite is fully offline: no Ollama, no control plane, no network.
      # The --live tests are skipped here by design; they need a local GPU/RAM.
      - name: Test with coverage (>=80% required)
        run: pytest --cov=psiog_kendra --cov-report=term-missing --cov-fail-under=80
